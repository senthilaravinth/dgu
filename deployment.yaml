apiVersion: apps/v1
kind: Deployment
metadata:
  name: wallet-system-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: digital-wallet
  template:
    metadata:
      labels:
        app: digital-wallet
    spec:
      containers:
      - name: wallet-container
        image: digital-wallet-app:latest
        imagePullPolicy: Never # Uses the local image we just built
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: wallet-service
spec:
  type: NodePort
  selector:
    app: digital-wallet
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30005